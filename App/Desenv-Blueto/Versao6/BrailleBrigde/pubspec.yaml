name: braille_bridge_v6
description: BrailleBridge Versao 6 - Configuracoes avancadas, personalizacao e testes
publish_to: 'none'
version: 6.0.0+6

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.2
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
